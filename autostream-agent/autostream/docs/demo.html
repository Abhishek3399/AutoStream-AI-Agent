<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoStream AI Agent – Live Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#05080f;color:#fff;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.3)}50%{box-shadow:0 0 20px 4px rgba(139,92,246,.15)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes badgePop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--target-width)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.fadeUp{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) forwards}
.dot1{animation:dot .9s ease-in-out infinite}
.dot2{animation:dot .9s ease-in-out .18s infinite}
.dot3{animation:dot .9s ease-in-out .36s infinite}
.badge-anim{animation:badgePop .25s cubic-bezier(.16,1,.3,1) forwards}
.panel-anim{animation:slideInRight .4s cubic-bezier(.16,1,.3,1) forwards}

.noise::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:0}

.msg-user{background:linear-gradient(135deg,#4f46e5,#6366f1);border-radius:18px 18px 4px 18px}
.msg-agent{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:18px 18px 18px 4px}

.send-btn{background:linear-gradient(135deg,#4f46e5,#6366f1);transition:all .2s}
.send-btn:hover:not(:disabled){background:linear-gradient(135deg,#4338ca,#4f46e5);transform:scale(1.04)}
.send-btn:disabled{background:rgba(255,255,255,.06);cursor:not-allowed}

.chip{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#94a3b8;border-radius:99px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.chip:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:#e2e8f0}

.input-area{background:#0d1119;border:1px solid rgba(255,255,255,.08);border-radius:16px;transition:border-color .3s,box-shadow .3s}
.input-area:focus-within{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.input-area.high-intent{border-color:rgba(245,158,11,.35);box-shadow:0 0 0 3px rgba(245,158,11,.07)}

textarea{background:transparent;color:#e2e8f0;font-size:14px;resize:none;outline:none;width:100%;line-height:1.6;font-family:'DM Sans',sans-serif}
textarea::placeholder{color:#475569}
textarea:disabled{opacity:.5}
</style>
</head>
<body>
<div id="root" class="noise"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── Knowledge Base (embedded for browser use) ──────────────────────────────
const KNOWLEDGE_BASE = `
[COMPANY]
AutoStream – AI-powered video editing for serious creators.
AutoStream automates the entire video editing workflow for YouTube, Instagram, TikTok, LinkedIn, and Twitter/X.

[PRICING]
Basic Plan: $29/month (or $23/month billed annually).
  Includes: 10 videos/month, 720p export, basic auto-cut editing, 50+ templates, 200+ music tracks, email support (48h response), 1 seat, 5 GB storage.
  Limitations: No AI captions, no 4K, no 24/7 support, no analytics dashboard.

Pro Plan: $79/month (or $63/month billed annually).
  Includes: Unlimited videos, 4K export, AI captions in 50+ languages (95%+ accuracy), advanced auto-edit with scene detection + filler-word removal, 500+ templates, custom branding/watermarks, 24/7 live priority support, analytics dashboard, multi-platform one-click export, 3 seats, 100 GB storage, B-roll suggestions, thumbnail generator.

[POLICIES]
Refund Policy: No refunds after 7 days. Within 7 days, full refund available.
Support: 24/7 live support on Pro only. Basic gets email support with 48h response.
Trial: 14-day free trial for both plans. Credit card required. No charge until trial ends.
Cancellation: Cancel anytime. Subscription active until end of billing period.
Billing: Monthly or annual. Annual saves ~20%. All prices in USD.

[FEATURES]
AI Captions: 50+ languages, 95%+ accuracy, fully editable, auto-sync. Pro only.
Auto-Edit: Removes dead air, filler words (um/uh/like), poor lighting/audio. Both plans (advanced on Pro).
Templates: Gaming, vlogging, tutorials, podcasts, product reviews. Basic: 50+, Pro: 500+.
Export: YouTube, Instagram Reels/Stories, TikTok, LinkedIn, Twitter/X. One-click publishing on Pro.
Analytics: Views, engagement, watch time, retention curves across all platforms. Pro only.
Thumbnail Generator: AI-generated thumbnails, text overlays, A/B testing. Pro only.
`;

// ─── System prompt ───────────────────────────────────────────────────────────
function buildSystemPrompt(stage, leadInfo) {
  const lead = JSON.stringify(
    Object.fromEntries(Object.entries(leadInfo).filter(([,v]) => v)),
    null, 2
  ) || "{}";

  return `You are Stream, AutoStream's intelligent AI sales assistant.
AutoStream is a SaaS platform providing automated video editing tools for content creators.

━━━ KNOWLEDGE BASE ━━━
${KNOWLEDGE_BASE}

━━━ RULES ━━━
1. Answer ONLY from the knowledge base – never invent features or prices.
2. Classify every user message:
   • greeting      – hello, hi, casual openers
   • inquiry       – questions about features, pricing, plans, policies
   • high_intent   – wants to sign up, try the product, "I want to try", "how do I start", mentions their channel/platform ready to start

3. Lead collection (follow EXACTLY):
   • high_intent AND stage=="chat"       → warmly acknowledge, set stage="collecting_name", ask for their first name
   • stage=="collecting_name"            → extract name, set stage="collecting_email", ask for email
   • stage=="collecting_email"           → extract email, set stage="collecting_platform", ask which platform (YouTube/Instagram/TikTok/etc)
   • stage=="collecting_platform"        → extract platform, set stage="complete"
   • NEVER ask for all fields at once
   • NEVER set stage="complete" before all three fields are extracted
   • Be warm and conversational, not robotic

━━━ CURRENT STATE ━━━
Stage: ${stage}
Collected: ${lead}

━━━ RESPONSE ━━━
Respond ONLY with valid JSON, no markdown fences:
{"intent":"greeting|inquiry|high_intent","message":"your reply","stage":"chat|collecting_name|collecting_email|collecting_platform|complete","extracted_value":"value user just gave or null"}`;
}

// ─── Intent colors/labels ────────────────────────────────────────────────────
const INTENT_CONFIG = {
  greeting: { label: "Greeting", dot: "#94a3b8", bg: "rgba(30,41,59,.6)", text: "#94a3b8", ring: "rgba(100,116,139,.3)" },
  inquiry:  { label: "Exploring", dot: "#38bdf8", bg: "rgba(7,36,60,.6)", text: "#38bdf8", ring: "rgba(56,189,248,.3)" },
  high_intent: { label: "High Intent ✦", dot: "#fbbf24", bg: "rgba(60,36,0,.6)", text: "#fbbf24", ring: "rgba(251,191,36,.35)" },
};

// ─── Stage progress ──────────────────────────────────────────────────────────
const STAGE_ORDER = ["chat","collecting_name","collecting_email","collecting_platform","complete"];
function stageProgress(stage) {
  if (stage === "chat") return 0;
  return (STAGE_ORDER.indexOf(stage)) / 3;
}

// ─── Chips ───────────────────────────────────────────────────────────────────
const CHIPS = [
  "What's in the Pro plan?",
  "How much is Basic?",
  "Do you have a free trial?",
  "I want to sign up for Pro 🚀",
];

// ─── SVG Icons ───────────────────────────────────────────────────────────────
const ZapIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const SendIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
const ResetIcon = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>;
const CheckIcon = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const UserIcon = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const MailIcon = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
const TvIcon = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>;

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [messages, setMessages] = useState([{
    id: "welcome", role: "agent",
    content: "Hey there! 👋 I'm Stream, AutoStream's AI assistant. I can help with pricing, features, or getting you started on a free trial. What's on your mind?",
    intent: "greeting", ts: new Date()
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [intent, setIntent] = useState("greeting");
  const [stage, setStage] = useState("chat");
  const [leadInfo, setLeadInfo] = useState({});
  const [leadCaptured, setLeadCaptured] = useState(false);
  const [convHistory, setConvHistory] = useState([]);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const showPanel = stage !== "chat" || leadCaptured || Object.keys(leadInfo).length > 0;

  const parseResponse = (raw) => {
    try { return JSON.parse(raw); } catch (_) {}
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch (_) {} }
    return { intent: "inquiry", message: raw, stage: stage, extracted_value: null };
  };

  const sendMessage = useCallback(async (text) => {
    if (!text.trim() || loading) return;
    const userText = text.trim();
    setInput("");

    const userMsg = { id: Date.now()+"u", role: "user", content: userText, ts: new Date() };
    const typingMsg = { id: "typing", role: "typing", ts: new Date() };
    setMessages(prev => [...prev, userMsg, typingMsg]);
    setLoading(true);

    const newHistory = [...convHistory, { role: "user", content: userText }];

    try {
      const sysPrompt = buildSystemPrompt(stage, leadInfo);
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: sysPrompt,
          messages: newHistory
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text ?? "I'm sorry, something went wrong.";
      const parsed = parseResponse(raw);

      const agentText = parsed.message || raw;
      const newIntent = parsed.intent || "inquiry";
      const newStage = parsed.stage || stage;
      const extracted = parsed.extracted_value;

      // Update lead info
      const updatedLead = { ...leadInfo };
      if (extracted) {
        if (stage === "collecting_name") updatedLead.name = extracted;
        else if (stage === "collecting_email") updatedLead.email = extracted;
        else if (stage === "collecting_platform") updatedLead.platform = extracted;
      }

      const agentMsg = { id: Date.now()+"a", role: "agent", content: agentText, intent: newIntent, ts: new Date() };
      setMessages(prev => [...prev.filter(m => m.id !== "typing"), agentMsg]);
      setConvHistory([...newHistory, { role: "assistant", content: agentText }]);
      setIntent(newIntent);
      setStage(newStage);
      setLeadInfo(updatedLead);

      // Fire lead capture when complete
      if (newStage === "complete" && !leadCaptured && updatedLead.name && updatedLead.email && updatedLead.platform) {
        console.log(`Lead captured: ${updatedLead.name}, ${updatedLead.email}, ${updatedLead.platform}`);
        setLeadCaptured(true);
      }
    } catch (err) {
      setMessages(prev => [...prev.filter(m => m.id !== "typing"), {
        id: Date.now()+"e", role: "agent",
        content: "I'm having trouble connecting right now. Please try again in a moment.",
        intent: "greeting", ts: new Date()
      }]);
    } finally {
      setLoading(false);
      setTimeout(() => inputRef.current?.focus(), 50);
    }
  }, [loading, stage, leadInfo, leadCaptured, convHistory]);

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
  };

  const reset = () => {
    setMessages([{
      id: "welcome", role: "agent",
      content: "Hey there! 👋 I'm Stream, AutoStream's AI assistant. What can I help you with today?",
      intent: "greeting", ts: new Date()
    }]);
    setInput(""); setLoading(false); setIntent("greeting"); setStage("chat");
    setLeadInfo({}); setLeadCaptured(false); setConvHistory([]);
  };

  const ic = INTENT_CONFIG[intent] || INTENT_CONFIG.greeting;
  const progress = stageProgress(stage);
  const isHighIntent = intent === "high_intent";

  const fields = [
    { icon: UserIcon, label: "Full Name", value: leadInfo.name, active: stage === "collecting_name", done: !!leadInfo.name },
    { icon: MailIcon, label: "Email Address", value: leadInfo.email, active: stage === "collecting_email", done: !!leadInfo.email },
    { icon: TvIcon, label: "Creator Platform", value: leadInfo.platform, active: stage === "collecting_platform", done: !!leadInfo.platform },
  ];

  return (
    <div style={{ position:"relative", zIndex:1, minHeight:"100vh", display:"flex", flexDirection:"column" }}>

      {/* Ambient glow */}
      <div style={{ position:"fixed", inset:0, pointerEvents:"none",
        background: isHighIntent
          ? "radial-gradient(ellipse 70% 50% at 50% -10%, rgba(245,158,11,.07), transparent)"
          : "radial-gradient(ellipse 70% 50% at 50% -10%, rgba(99,102,241,.08), transparent)"
      }}/>

      {/* Nav */}
      <nav style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"16px 32px", borderBottom:"1px solid rgba(255,255,255,.05)", position:"relative", zIndex:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:30, height:30, borderRadius:10,
            background:"linear-gradient(135deg,#7c3aed,#4f46e5)",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 4px 20px rgba(124,58,237,.4)" }}>
            <ZapIcon/>
          </div>
          <span style={{ fontFamily:"Syne,sans-serif", fontWeight:700, fontSize:16, letterSpacing:"-.02em" }}>
            AutoStream
          </span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          {/* Intent badge */}
          <div key={intent} className="badge-anim" style={{ display:"flex", alignItems:"center", gap:6,
            padding:"5px 12px", borderRadius:99, fontSize:11, fontWeight:600,
            background:ic.bg, color:ic.text, border:`1px solid ${ic.ring}`, letterSpacing:".01em" }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:ic.dot,
              animation: isHighIntent ? "pulseGlow 1.5s ease-in-out infinite" : "none",
              boxShadow: isHighIntent ? "0 0 6px rgba(251,191,36,.6)" : "none" }}/>
            {ic.label}
          </div>
          <button onClick={reset} style={{ width:30, height:30, borderRadius:8,
            background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.08)",
            cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#94a3b8" }}>
            <ResetIcon/>
          </button>
        </div>
      </nav>

      {/* Hero */}
      <div style={{ textAlign:"center", padding:"32px 20px 24px", position:"relative", zIndex:1 }}>
        <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"5px 14px",
          borderRadius:99, border:"1px solid rgba(124,58,237,.25)", background:"rgba(124,58,237,.1)",
          color:"#a78bfa", fontSize:11, fontWeight:600, letterSpacing:".03em", marginBottom:16 }}>
          <span style={{ width:5, height:5, borderRadius:"50%", background:"#a78bfa",
            animation:"dot .9s ease-in-out infinite" }}/>
          AI-POWERED VIDEO EDITING
        </div>
        <h1 style={{ fontFamily:"Syne,sans-serif", fontWeight:800, fontSize:32, lineHeight:1.1,
          letterSpacing:"-.03em", marginBottom:10 }}>
          Edit faster.{" "}
          <span style={{ background:"linear-gradient(90deg,#818cf8,#a78bfa)", WebkitBackgroundClip:"text",
            WebkitTextFillColor:"transparent" }}>
            Publish smarter.
          </span>
        </h1>
        <p style={{ color:"#64748b", fontSize:14, maxWidth:460, margin:"0 auto" }}>
          Ask Stream anything — pricing, features, or how to get started with your 14-day free trial.
        </p>
      </div>

      {/* Main layout */}
      <div style={{ flex:1, display:"flex", justifyContent:"center", padding:"0 20px 24px",
        position:"relative", zIndex:1 }}>
        <div style={{ display:"flex", gap:16, width:"100%", maxWidth:900 }}>

          {/* Chat card */}
          <div style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0,
            background:"rgba(8,12,21,.85)", backdropFilter:"blur(20px)",
            borderRadius:20, border:"1px solid rgba(255,255,255,.07)",
            boxShadow:"0 25px 60px rgba(0,0,0,.5)",
            transition:"border-color .4s",
            borderColor: isHighIntent ? "rgba(245,158,11,.2)" : "rgba(255,255,255,.07)",
            maxHeight:520, overflow:"hidden" }}>

            {/* Messages */}
            <div style={{ flex:1, overflowY:"auto", padding:"20px 20px 8px" }}>
              {messages.map((msg, idx) => {
                if (msg.role === "typing") return (
                  <div key="typing" style={{ display:"flex", alignItems:"flex-end", gap:10, marginBottom:14 }}>
                    <div style={{ width:26, height:26, borderRadius:"50%", flexShrink:0,
                      background:"linear-gradient(135deg,#7c3aed,#4f46e5)",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:10, fontWeight:700 }}>S</div>
                    <div style={{ display:"flex", alignItems:"center", gap:4, padding:"10px 14px",
                      background:"#111827", border:"1px solid rgba(255,255,255,.07)", borderRadius:"14px 14px 14px 3px" }}>
                      {[0,1,2].map(i => <span key={i} className={`dot${i+1}`} style={{ width:5, height:5, borderRadius:"50%", background:"#64748b", display:"block" }}/>)}
                    </div>
                  </div>
                );

                const isUser = msg.role === "user";
                return (
                  <div key={msg.id} className="fadeUp" style={{ display:"flex", alignItems:"flex-end", gap:10,
                    marginBottom:14, flexDirection: isUser ? "row-reverse" : "row" }}>
                    {!isUser && (
                      <div style={{ width:26, height:26, borderRadius:"50%", flexShrink:0,
                        background:"linear-gradient(135deg,#7c3aed,#4f46e5)",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:10, fontWeight:700, boxShadow:"0 4px 12px rgba(124,58,237,.35)" }}>S</div>
                    )}
                    <div style={{ maxWidth:"76%", padding:"10px 14px", fontSize:14, lineHeight:1.65 }}
                      className={isUser ? "msg-user" : "msg-agent"}>
                      {msg.content}
                      <div style={{ fontSize:10, marginTop:4, opacity:.45, textAlign: isUser ? "right" : "left" }}>
                        {msg.ts.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div ref={bottomRef}/>
            </div>

            {/* Chips */}
            {messages.length === 1 && !loading && (
              <div style={{ padding:"0 20px 12px", display:"flex", flexWrap:"wrap", gap:7 }}>
                {CHIPS.map(c => (
                  <button key={c} className="chip" onClick={() => sendMessage(c)}>{c}</button>
                ))}
              </div>
            )}

            {/* Input */}
            <div style={{ padding:"10px 16px 14px", borderTop:"1px solid rgba(255,255,255,.05)",
              borderColor: isHighIntent ? "rgba(245,158,11,.12)" : "rgba(255,255,255,.05)" }}>
              <div className={`input-area ${isHighIntent ? "high-intent" : ""}`}
                style={{ display:"flex", alignItems:"flex-end", gap:10, padding:"10px 14px" }}>
                <textarea
                  ref={inputRef}
                  rows={1}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKey}
                  disabled={loading}
                  placeholder={loading ? "Stream is thinking…" : "Ask me about AutoStream…"}
                  style={{ maxHeight:80 }}
                  onInput={e => { e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; }}
                />
                <button className="send-btn" disabled={!input.trim() || loading}
                  onClick={() => sendMessage(input)}
                  style={{ width:32, height:32, borderRadius:10, border:"none", cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <SendIcon/>
                </button>
              </div>
              <p style={{ textAlign:"center", fontSize:10, color:"#334155", marginTop:6 }}>
                Enter to send · Shift+Enter for new line
              </p>
            </div>
          </div>

          {/* Lead panel */}
          {showPanel && (
            <div className="panel-anim" style={{ width:220, flexShrink:0, display:"flex", flexDirection:"column", gap:12 }}>

              {/* Fields card */}
              <div style={{ borderRadius:16, border:"1px solid rgba(255,255,255,.07)",
                background:"rgba(10,14,24,.9)", padding:"18px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                  <span style={{ fontSize:10, fontWeight:700, letterSpacing:".08em", color:"#475569", textTransform:"uppercase" }}>
                    Lead Capture
                  </span>
                  <span style={{ fontSize:11, color:"#475569" }}>
                    {fields.filter(f=>f.done).length}/3
                  </span>
                </div>

                {/* Progress bar */}
                <div style={{ height:3, background:"rgba(255,255,255,.05)", borderRadius:99, marginBottom:16, overflow:"hidden" }}>
                  <div style={{ height:"100%", borderRadius:99, width:`${progress*100}%`,
                    background:"linear-gradient(90deg,#7c3aed,#fbbf24)",
                    transition:"width .5s cubic-bezier(.16,1,.3,1)" }}/>
                </div>

                {/* Fields */}
                {fields.map(({icon: Icon, label, value, active, done}) => (
                  <div key={label} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                    <div style={{ width:28, height:28, borderRadius:8, flexShrink:0,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      background: done ? "rgba(124,58,237,.15)" : active ? "rgba(99,102,241,.1)" : "rgba(255,255,255,.04)",
                      transition:"background .3s" }}>
                      {done
                        ? <span style={{ color:"#a78bfa" }}><CheckIcon/></span>
                        : <span style={{ color: active ? "#818cf8" : "#334155" }}><Icon/></span>
                      }
                    </div>
                    <div style={{ minWidth:0 }}>
                      <p style={{ fontSize:12, fontWeight:500, color: done ? "#cbd5e1" : active ? "#e2e8f0" : "#334155",
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", transition:"color .3s" }}>
                        {done && value ? value : label}
                      </p>
                      {active && !done && (
                        <p style={{ fontSize:10, color:"#818cf8", marginTop:1 }}>Waiting…</p>
                      )}
                    </div>
                  </div>
                ))}
              </div>

              {/* Success card */}
              {leadCaptured && (
                <div className="fadeUp" style={{ borderRadius:16, border:"1px solid rgba(16,185,129,.2)",
                  background:"rgba(6,30,20,.8)", padding:"18px 16px", textAlign:"center" }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background:"rgba(16,185,129,.12)",
                    display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 10px",
                    boxShadow:"0 0 16px rgba(16,185,129,.2)" }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2.5"
                      strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <p style={{ fontSize:13, fontWeight:600, color:"#34d399", marginBottom:5 }}>Lead Captured!</p>
                  <p style={{ fontSize:11, color:"#065f46", lineHeight:1.5 }}>
                    Our team will reach out within 24 hours.
                  </p>
                  <div style={{ marginTop:12, padding:"8px", borderRadius:10,
                    background:"rgba(16,185,129,.06)", border:"1px solid rgba(16,185,129,.1)" }}>
                    {leadInfo.name && <p style={{ fontSize:11, color:"#6ee7b7", marginBottom:2 }}>👤 {leadInfo.name}</p>}
                    {leadInfo.email && <p style={{ fontSize:11, color:"#6ee7b7", marginBottom:2 }}>✉️ {leadInfo.email}</p>}
                    {leadInfo.platform && <p style={{ fontSize:11, color:"#6ee7b7" }}>📺 {leadInfo.platform}</p>}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Footer */}
      <div style={{ textAlign:"center", padding:"0 0 16px", fontSize:11, color:"#1e293b", position:"relative", zIndex:1 }}>
        AutoStream AI Assistant · Responses grounded in official documentation · Powered by Claude
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
